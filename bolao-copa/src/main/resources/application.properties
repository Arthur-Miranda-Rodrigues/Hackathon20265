spring.application.name=bolao-copa
server.port=8080

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/bolao_copa?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Sao_Paulo
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT - mantenha uma chave com pelo menos 256 bits em produção
api.security.token.secret=minha-chave-secreta-deve-ter-256-bits-aqui!!
