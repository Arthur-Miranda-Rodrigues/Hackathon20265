spring.application.name=bolao-copa
server.port=8080

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/bolao_copa?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Sao_Paulo
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT - mantenha uma chave com pelo menos 256 bits em produção
api.security.token.secret=minha-chave-secreta-deve-ter-256-bits-aqui!!

# E-mail (recuperação de senha). Descomente e preencha para enviar de verdade.
# Sem 'spring.mail.host', o token apenas é registrado no log do servidor.
#spring.mail.host=smtp.gmail.com
#spring.mail.port=587
#spring.mail.username=SEU_EMAIL@gmail.com
#spring.mail.password=SUA_SENHA_DE_APP
#spring.mail.properties.mail.smtp.auth=true
#spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=nao-responder@bolaocopa.com
