<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.w3.org/1999/xhtml">
<head th:fragment="head">
    <meta charset="UTF-8">
    <title>Bolão Copa 2026 - UniALFA</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script>document.documentElement.setAttribute('data-bs-theme', 'dark');</script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="container py-3">
    <div th:fragment="menu">
        <div class="d-flex align-items-center justify-content-between mb-3">
            <h1 class="h3 mb-0">
                ⚽ Bolão Copa do Mundo 2026
            </h1>
            <form th:action="@{/logout}" method="post" style="display:inline;">
                <button type="submit" class="btn btn-outline-danger btn-sm">Sair</button>
            </form>
        </div>
        <div class="mb-3 d-flex flex-wrap gap-2">
            <a class="btn btn-outline-primary" th:href="@{/dashboard}">
                <i class="bi bi-speedometer2"></i> Dashboard
            </a>
            <a class="btn btn-outline-primary" th:href="@{/selecoes}">
                <i class="bi bi-flag"></i> Seleções
            </a>
            <a class="btn btn-outline-primary" th:href="@{/partidas}">
                <i class="bi bi-trophy"></i> Partidas
            </a>
            <a class="btn btn-outline-primary" th:href="@{/usuarios}">
                <i class="bi bi-people"></i> Usuários
            </a>
        </div>
        <div th:if="${sucesso}" class="alert alert-success" th:text="${sucesso}"></div>
        <div th:if="${erro}" class="alert alert-warning" th:text="${erro}"></div>
    </div>

    <div th:unless="${#authorization.expression('isAuthenticated()')}">
        <a th:href="@{/login}" class="btn btn-primary">Entrar no painel</a>
    </div>
    <div th:if="${#authorization.expression('isAuthenticated()')}">
        <p class="lead">Painel administrativo do Bolão Copa do Mundo 2026.</p>
        <a th:href="@{/dashboard}" class="btn btn-primary">Abrir dashboard</a>
    </div>
</div>

<div th:fragment="script">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
</div>
</body>
</html>
