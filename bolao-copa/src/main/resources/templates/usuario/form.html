<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:insert="~{index :: head}"><meta charset="UTF-8"></head>
<body>
<div class="container py-3">
    <div th:insert="~{index :: menu}"></div>
    <form th:action="@{/usuarios/salvar}" method="post">
        <input type="hidden" name="id" th:value="${usuario.id}">
        <input type="hidden" name="pontuacaoTotal" th:value="${usuario.pontuacaoTotal}">
        <input type="hidden" name="placaresExatos" th:value="${usuario.placaresExatos}">
        <div class="mb-3"><label class="form-label">Nome</label><input class="form-control" name="nome" th:value="${usuario.nome}" required></div>
        <div class="mb-3"><label class="form-label">E-mail</label><input class="form-control" name="email" th:value="${usuario.email}" required></div>
        <div class="mb-3"><label class="form-label">Avatar URL</label><input class="form-control" name="avatarUrl" th:value="${usuario.avatarUrl}"></div>
        <div class="mb-3"><label class="form-label">Nova senha</label><input class="form-control" type="password" name="senha"></div>
        <div class="mb-3"><label class="form-label">Perfil</label><select class="form-select" name="perfil"><option th:each="perfil : ${perfis}" th:value="${perfil}" th:text="${perfil}" th:selected="${usuario.perfil == perfil}"></option></select></div>
        <input type="hidden" name="bloqueado" value="false">
            <div class="form-check mb-3"><input class="form-check-input" type="checkbox" name="bloqueado" value="true" th:checked="${usuario.bloqueado}"><label class="form-check-label">Bloqueado</label></div>
        <button class="btn btn-dark" type="submit">Salvar</button>
        <a th:href="@{/usuarios}" class="btn btn-outline-secondary">Voltar</a>
    </form>
</div>
<div th:insert="~{index :: script}"></div>
</body>
</html>
